<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unloop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0c0c0f;
        --surface: #141418;
        --surface2: #1c1c22;
        --border: rgba(255, 255, 255, 0.07);
        --border2: rgba(255, 255, 255, 0.12);
        --text: #f0ede8;
        --muted: #6b6a72;
        --accent: #c8f060;
        --accent2: #8b5cf6;
        --warn: #f59e0b;
        --danger: #ef4444;
        --font-head: "Syne", sans-serif;
        --font-mono: "DM Mono", monospace;
      }

      body {
        width: 320px;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-head);
        overflow: hidden;
      }

      /* Header */
      .header {
        padding: 20px 20px 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logo-mark {
        width: 28px;
        height: 28px;
        background: var(--accent);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 800;
        color: #0c0c0f;
        letter-spacing: -1px;
      }

      .logo-name {
        font-size: 16px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--text);
      }

      .status-pill {
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 20px;
        border: 1px solid var(--border2);
        color: var(--muted);
        letter-spacing: 0.5px;
      }

      .status-pill.active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(200, 240, 96, 0.08);
      }

      .status-pill.locked {
        border-color: var(--danger);
        color: var(--danger);
        background: rgba(239, 68, 68, 0.08);
      }

      /* Session card */
      .session-card {
        margin: 16px 16px 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        position: relative;
        overflow: hidden;
      }

      .session-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), transparent);
        opacity: 0;
        transition: opacity 0.4s;
      }

      .session-card.has-data::before {
        opacity: 1;
      }

      .session-label {
        font-size: 10px;
        font-family: var(--font-mono);
        color: var(--muted);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      .big-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .big-stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .big-num {
        font-size: 32px;
        font-weight: 800;
        letter-spacing: -2px;
        color: var(--text);
        line-height: 1;
        font-family: var(--font-head);
        transition: color 0.3s;
      }

      .big-num.warn {
        color: var(--warn);
      }
      .big-num.danger {
        color: var(--danger);
      }

      .big-unit {
        font-size: 11px;
        color: var(--muted);
        font-family: var(--font-mono);
        letter-spacing: 0.3px;
      }

      /* Phase indicator */
      .phase-bar {
        margin: 12px 16px 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .phase-dots {
        display: flex;
        gap: 5px;
      }

      .phase-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--surface2);
        border: 1px solid var(--border2);
        transition: all 0.3s;
      }

      .phase-dot.active {
        background: var(--accent);
        border-color: var(--accent);
      }
      .phase-dot.warn {
        background: var(--warn);
        border-color: var(--warn);
      }
      .phase-dot.danger {
        background: var(--danger);
        border-color: var(--danger);
      }

      .phase-label {
        font-size: 11px;
        color: var(--muted);
        font-family: var(--font-mono);
        flex: 1;
      }

      .phase-label span {
        color: var(--text);
        font-weight: 500;
      }

      /* Progress track */
      .progress-section {
        margin: 12px 16px 0;
      }

      .progress-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }

      .progress-title {
        font-size: 10px;
        font-family: var(--font-mono);
        color: var(--muted);
        letter-spacing: 0.5px;
      }

      .progress-markers {
        display: flex;
        gap: 8px;
        font-size: 9px;
        font-family: var(--font-mono);
        color: var(--muted);
      }

      .progress-track {
        height: 4px;
        background: var(--surface);
        border-radius: 2px;
        overflow: visible;
        position: relative;
      }

      .progress-fill {
        height: 100%;
        border-radius: 2px;
        background: var(--accent);
        transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
      }

      .progress-fill.warn {
        background: var(--warn);
      }
      .progress-fill.danger {
        background: var(--danger);
      }

      .progress-fill::after {
        content: "";
        position: absolute;
        right: -1px;
        top: -2px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: inherit;
      }

      .threshold-marks {
        position: relative;
        height: 10px;
        margin-top: 3px;
      }

      .t-mark {
        position: absolute;
        font-size: 8px;
        font-family: var(--font-mono);
        color: var(--muted);
        transform: translateX(-50%);
      }

      /* Lifetime stats */
      .lifetime {
        margin: 12px 16px 0;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }

      .lt-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        text-align: center;
      }

      .lt-num {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -1px;
        display: block;
        margin-bottom: 2px;
      }

      .lt-label {
        font-size: 9px;
        font-family: var(--font-mono);
        color: var(--muted);
        letter-spacing: 0.3px;
      }

      /* Settings row */
      .settings-row {
        margin: 12px 16px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      .settings-label {
        font-size: 11px;
        color: var(--muted);
        font-family: var(--font-mono);
      }

      .toggle {
        position: relative;
        width: 36px;
        height: 20px;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        inset: 0;
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
      }

      .toggle-slider::before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        left: 2px;
        top: 2px;
        background: var(--muted);
        border-radius: 50%;
        transition: 0.2s;
      }

      .toggle input:checked + .toggle-slider {
        background: rgba(200, 240, 96, 0.15);
        border-color: var(--accent);
      }
      .toggle input:checked + .toggle-slider::before {
        transform: translateX(16px);
        background: var(--accent);
      }

      /* Locked state overlay */
      .lock-overlay {
        display: none;
        margin: 0 16px 16px;
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.25);
        border-radius: 12px;
        padding: 14px;
        text-align: center;
      }

      .lock-overlay.visible {
        display: block;
      }

      .lock-countdown {
        font-size: 28px;
        font-weight: 800;
        font-family: var(--font-mono);
        color: var(--danger);
        letter-spacing: -1px;
      }

      .lock-msg {
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
        font-family: var(--font-mono);
      }

      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .session-card,
      .phase-bar,
      .progress-section,
      .lifetime,
      .settings-row {
        animation: fadeIn 0.3s ease both;
      }

      .phase-bar {
        animation-delay: 0.05s;
      }
      .progress-section {
        animation-delay: 0.1s;
      }
      .lifetime {
        animation-delay: 0.15s;
      }
      .settings-row {
        animation-delay: 0.2s;
      }

      .mode-row {
        margin: 0 16px 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      .mode-btns {
        display: flex;
        gap: 4px;
      }

      .mode-btn {
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid var(--border2);
        background: transparent;
        color: var(--muted);
        font-family: var(--font-mono);
        font-size: 10px;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.3px;
      }

      .mode-btn:hover {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .mode-btn.active {
        background: rgba(200, 240, 96, 0.12);
        border-color: var(--accent);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <div class="logo-mark">∞</div>
        <span class="logo-name">unloop</span>
      </div>
      <div class="status-pill" id="status-pill">idle</div>
    </div>

    <!-- Session card -->
    <div class="session-card" id="session-card">
      <div class="session-label">This session</div>
      <div class="big-stats">
        <div class="big-stat">
          <div class="big-num" id="pop-count">0</div>
          <div class="big-unit">reels watched</div>
        </div>
        <div class="big-stat">
          <div class="big-num" id="pop-time">~0s</div>
          <div class="big-unit">time spent</div>
        </div>
      </div>
    </div>

    <!-- Phase dots -->
    <div class="phase-bar">
      <div class="phase-dots">
        <div class="phase-dot active" id="dot1"></div>
        <div class="phase-dot" id="dot2"></div>
        <div class="phase-dot" id="dot3"></div>
        <div class="phase-dot" id="dot4"></div>
      </div>
      <div class="phase-label">
        Phase: <span id="phase-text">Light usage</span>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-section">
      <div class="progress-row">
        <span class="progress-title">Session progress</span>
        <span class="progress-markers">
          <span>20</span><span>40</span><span>60</span>
        </span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
      <div class="threshold-marks">
        <span class="t-mark" style="left: 33.3%">soft</span>
        <span class="t-mark" style="left: 66.6%">deep</span>
        <span class="t-mark" style="left: 100%">lock</span>
      </div>
    </div>

    <!-- Lock countdown (shown when locked) -->
    <div class="lock-overlay" id="lock-overlay">
      <div class="lock-countdown" id="lock-countdown">--:--</div>
      <div class="lock-msg">cooldown active · come back soon</div>
    </div>

    <!-- Lifetime stats -->
    <div class="lifetime">
      <div class="lt-card">
        <span class="lt-num" id="lt-today">0</span>
        <span class="lt-label">today</span>
      </div>
      <div class="lt-card">
        <span class="lt-num" id="lt-total">0</span>
        <span class="lt-label">all time</span>
      </div>
      <div class="lt-card">
        <span class="lt-num" id="lt-time">0m</span>
        <span class="lt-label">time saved</span>
      </div>
    </div>

    <!-- Mode selector — paste before the settings-row div -->
    <div class="mode-row">
      <span class="settings-label">Mode</span>
      <div class="mode-btns">
        <button class="mode-btn" id="mode-light">Light</button>
        <button class="mode-btn active" id="mode-balanced">Balanced</button>
        <button class="mode-btn" id="mode-focus">Focus</button>
      </div>
    </div>

    <!-- Settings toggle -->
    <div class="settings-row">
      <span class="settings-label">Unloop active</span>
      <label class="toggle">
        <input type="checkbox" id="main-toggle" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
